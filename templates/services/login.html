<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HopeConnect - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script
      defer
      src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
        <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <script defer src="{{ url_for('static', filename='login.js') }}"></script>
  </head>
  <body class="relative min-h-screen">
    
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div
      class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 w-full max-w-md px-4"
    >
      {% for category, message in messages %}
      <div
        class="mb-4 p-4 rounded-lg shadow-lg {% if category == 'success' %} bg-green-100 text-green-800 border border-green-400 {% elif category == 'error' %} bg-red-100 text-red-800 border border-red-400 {% else %} bg-yellow-100 text-yellow-800 border border-yellow-400 {% endif %}"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}

      <header class="bg-blue-900 text-white shadow-md">
      <div
        class="container mx-auto px-6 py-4 flex justify-between items-center"
      >
        <h1 class="text-2xl font-bold">BrightPath Learning</h1>
        <nav class="space-x-6">
          <a href="{{url_for("home")}}" class="hover:text-yellow-400">Home</a>
          <a href="{{url_for("login")}}" class="hover:text-yellow-400">Login</a>
          <a href="{{url_for("register")}}" class="hover:text-yellow-400">Register</a>
        </nav>
      </div>
    </header>

    <!-- 🌾 Login Form Overlay -->
    <div
      class="relative z-10 flex items-center justify-center min-h-screen px-4"
    >
      <div
        class="bg-white bg-opacity-90 p-8 rounded-2xl shadow-2xl w-full max-w-md"
      >
        <h2 class="text-3xl font-bold text-center text-blue-900 mb-6">
          Welcome back
        </h2>

        <form
          action="{{ url_for('get_login') }}"
          method="POST"
          class="space-y-5"
        >
          <div>
            <label
              for="email"
              class="block mb-1 text-sm font-medium text-gray-700"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900"
            />
          </div>

          <div>
            <label
              for="password"
              class="block mb-1 text-sm font-medium text-gray-700"
              >Password</label
            >
            <input
              type="password"
              id="password"
              name="password"
              required
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-900"
            />
          </div>

          <button
            type="submit"
            class="w-full bg-blue-900 text-white py-2 rounded-lg hover:bg-green-600 transition"
          >
            Login
          </button>
        </form>

        <p class="text-sm text-center mt-4 text-gray-600">
          Don't have an account?
          <a
            href="{{ url_for('register') }}"
            class="text-green-600 hover:underline"
            >Register</a
          >
        </p>
      </div>
    </div>
  </body>
</html>
